# Default scan profile configuration for hcxdumptool
#
# This file is used to create scan configurations from the hcxtool submenu
# Each option includes a description and, if applicable, warnings or notes
#
# DO NOT EDIT THIS FILE. THIS IS USED BY THE SUBMENU FOR BUILDING PROFILES.
# DO NOT EDIT THIS FILE. THIS IS USED BY THE SUBMENU FOR BUILDING PROFILES.
# DO NOT EDIT THIS FILE. THIS IS USED BY THE SUBMENU FOR BUILDING PROFILES.

scan_profile:
  # Required options
  interface:
    value: ""                   # Leave blank to use the first suitable interface.
    description: >
      Name of the interface to be used.
      WARNING: hcxdumptool will change the mode, virtual MAC, and channel of this interface.

  outfile:
    value: "{timestamp}-{interface}.pcapng"  # Use timestamp and interface as template variables.
    description: >
      File name to which packets are written in pcapng format.
      Note: Existing file will be overwritten.

  # Channel/Frequency options
  channel:
    value: ["1a", "6a", "11a"]
    description: >
      List of channels to use. Band information required (e.g. 12a)
      Allowed bands: a (2.4 GHz), b (5 GHz), c (6 GHz), d (60 GHz), e (902 MHz).

  frequency:
    value: 2412
    use_all: false
    description: >
      Frequency (in MHz) to use (e.g., 2412, 2417, 5180).
      If 'use_all' is true, then the tool will use the "-F" flag to use all available frequencies.

  min_stay_time:
    value: 1
    description: >
      Minimum stay time (in seconds). May increase on new stations/authentications.

  ack:
    value: false
    description: >
      ACK incoming frames. Requires an interface that supports active monitor mode.

  # BPF related options
  autobpf:
    value: null
    description: >
        Enable autobpf.py on this scan profile. Query for macs associated with
        the your device. Effectively turning friendly-fire OFF for your hotspot.

  bpfc:
    value: ""
    description: >
      Filter string to compile a Berkeley Packet Filter (BPF) and exit.
      Example: 'wlan addr3 112233445566'

  bpf:
    value: ""
    description: >
      Path to a file containing BPF code in tcpdump decimal numbers format.
      (Maximum 4096 instructions.)

  # Timeouts, attempts, and error management
  tot:
    value: 0
    description: >
      Timeout timer in minutes. 0 disables the timer.

  errormax:
    value: 100
    description: >
      Maximum allowed errors before termination.

  watchdogmax:
    value: 600
    description: >
      Maximum timeout (in seconds) when no packets are received.

  attemptclientmax:
    value: 10
    description: >
      Maximum attempts to request an EAPOL M2. Set to 0 to disable CLIENT attacks.

  attemptapmax:
    value: 4
    description: >
      Maximum number of BEACONs to receive before stopping.
      If set to 0, additional options are automatically enabled:
        - disable_deauthentication
        - disable_proberequest
        - disable_association
        - disable_reassociation

  # Advanced options (less common)
  disable_deauthentication:
    value: false
    description: "Do not transmit DEAUTHENTICATION/DISASSOCIATION frames."

  disable_proberequest:
    value: false
    description: "Do not transmit PROBEREQUEST frames."

  disable_association:
    value: false
    description: "Do not authenticate/associate with an AP."

  disable_reassociation:
    value: false
    description: "Do not reassociate a client."

  disable_beacon:
    value: false
    description: >
      Disable internal beacon. Default: one beacon per second to wildcard SSID.

  proberesponsetx:
    value: 5
    description: >
      Transmit n PROBERESPONSEs from the ESSID ring buffer.

  essidlist:
    value: ""
    description: "Path to a file to initialize the ESSID list."

  tot_minutes:
    value: 0
    description: "Enable timeout timer in minutes (0 to disable)."

  exitoneapol:
    value: 0
    description: >
      Exit on first EAPOL occurrence. Bitmask values:
        1 = PMKID (from AP)
        2 = EAPOL M2M3 (authorized)
        4 = EAPOL M1M2/M1M2ROGUE (not authorized)
        8 = EAPOL M1

  # Actions on termination events
  onsigterm:
    value: "none"
    description: >
      Action on termination via SIGTERM. Allowed values: "poweroff", "reboot", or "none".

  ongpiobutton:
    value: "none"
    description: "Action when the GPIO button is pressed (poweroff, reboot, or none)."

  ontot:
    value: "none"
    description: "Action when tot timer expires (poweroff, reboot, or none)."

  onwatchdog:
    value: "none"
    description: "Action when watchdog times out (poweroff, reboot, or none)."

  onerror:
    value: "none"
    description: "Action on error (poweroff, reboot, or none)."

  # GPIO options for Raspberry Pi
  gpio_button:
    value: 0
    description: >
      GPIO pin number for button (2...27). If 0, GPIO is not in use.

  gpio_statusled:
    value: 0
    description: >
      GPIO pin number for status LED (2...27). If 0, GPIO is not in use.

  # GPS/NMEA options
  nmea_dev:
    value: ""
    description: "Path to the NMEA device (e.g., /dev/ttyACM0). Baudrate is assumed to be 9600."

  gpsd:
    value: false
    description: "Use gpsd to get position. gpsd will be switched to NMEA0183 mode."

  nmea_out:
    value: "{timestamp}.nmea"
    description: >
      Name of the NMEA output file. Default is based on timestamp.

  nmea_pcapng:
    value: false
    description: "If true, write GPS information to a pcapng dump file."

  # RCA scan option
  rcascan:
    value: "p"
    description: >
      Radio Channel Assignment scan mode: 'a' for active, 'p' for passive.
      (Packets are not stored; cannot be used with attack modes.)

  # Real-time display sorting (rds) options
  rds:
    value: 0
    description: >
      Sorting for real time display. In attack mode, default is to sort by time (last seen on top),
      or 1 to sort by status. In scan mode, 1 sorts by PROBERESPONSE count.

  # NMEA output conversion options (optional instructions provided)
  # (Users can refer to gpsbabel or related tools for further conversion)
